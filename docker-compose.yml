version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: vulnlab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${DB_NAME:-vulnlab}
      MYSQL_USER: ${DB_USER:-vulnlab_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vulnlab_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
